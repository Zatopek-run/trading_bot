services:
  bot:
    build: .
    container_name: trading_bot
    restart: unless-stopped
    env_file: .env
    command: python main.py
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    container_name: trading_dashboard
    restart: unless-stopped
    env_file: .env
    command: uvicorn dashboard:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
